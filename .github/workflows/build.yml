name: Build & Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run electron:build -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeFlow-Windows
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS
        run: npm run electron:build -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeFlow-macOS
          path: |
            release/*.dmg
            release/*.zip

  publish:
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    # 仅 main 分支推送 或 手动触发 时发布；其他分支只产出 artifact，不发布到 release
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "解析到版本号: v${VERSION}"

      - name: Check if release tag already exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.pkg.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Release ${TAG} 已存在，跳过发布。请在 package.json 中 bump version 后重新触发。"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifact
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: WeFlow-Windows
          path: artifacts/win

      - name: Download macOS artifact
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: WeFlow-macOS
          path: artifacts/mac

      - name: Create release ${{ steps.pkg.outputs.tag }}
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.pkg.outputs.tag }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          COMMIT_MSG="$(git log -1 --pretty=%s)"
          COMMIT_SHA="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

          gh release create "${TAG}" \
            --title "WeFlow ${TAG}" \
            --notes "**版本:** ${VERSION}
          **提交:** ${COMMIT_SHA} - ${COMMIT_MSG}
          **构建时间:** ${DATE}

          ---
          下载对应平台的安装包即可使用。" \
            artifacts/win/*.exe artifacts/mac/*.dmg artifacts/mac/*.zip
